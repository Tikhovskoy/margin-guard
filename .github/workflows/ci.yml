name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --all-packages --group dev

      - name: Ruff
        run: uv run ruff check apps/api apps/worker scripts

      - name: Ruff format
        run: uv run ruff format --check apps/api apps/worker scripts

      - name: Mypy
        run: |
          uv run mypy apps/api/src
          uv run mypy apps/worker/src

      - name: Pytest
        env:
          PYTHONPATH: apps/api/src:apps/worker/src
        run: uv run pytest

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare environment
        run: cp .env.example .env

      - name: Build Docker images
        run: docker compose build

  web-lint-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint web dashboard
        run: npm run lint

      - name: Test web dashboard
        run: npm run test

      - name: Build web dashboard
        run: npm run build
