name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --all-packages --group dev

      - name: Ruff
        run: uv run ruff check apps/api apps/worker scripts

      - name: Ruff format
        run: uv run ruff format --check apps/api apps/worker scripts

      - name: Mypy
        run: |
          uv run mypy apps/api/src
          uv run mypy apps/worker/src

      - name: Pytest
        env:
          PYTHONPATH: apps/api/src:apps/worker/src
        run: uv run pytest
