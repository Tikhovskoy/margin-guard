name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Подготовить заметки релиза
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { found=1 }
            found { print }
            found && /^## \[/ && $0 !~ "^## \\[" ver "\\]" { exit }
          ' CHANGELOG.md > release_notes.md

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
